<script>
window.addEventListener('error', function (e) {
  var root = document.getElementById('root');
  if (root && root.children.length === 0) {
    var msg = (e && e.message) ? e.message : 'Tidak diketahui';
    root.innerHTML =
      '<div style="font-family:system-ui,sans-serif;max-width:480px;margin:60px auto;padding:24px;border:1px solid #E2DCCB;border-radius:12px;background:#fff;color:#1C2622;">' +
      '<h2 style="margin:0 0 8px;font-size:18px;">Aplikasi gagal memuat</h2>' +
      '<p style="margin:0 0 8px;font-size:13px;color:#6F7C75;">Terjadi kesalahan teknis saat memuat aplikasi. Mohon salin pesan di bawah ini dan kirimkan kembali agar bisa diperbaiki:</p>' +
      '<pre style="white-space:pre-wrap;font-size:12px;background:#F3F0E7;padding:10px;border-radius:8px;overflow:auto;">' +
      String(msg).replace(/</g, '&lt;') + '</pre>' +
      '</div>';
  }
});
</script>

function getLoanSchedule(loan) {
  const tenor = Number(loan.tenor) || 0;
  const principal = Number(loan.jumlah) || 0;
  const rate = Number(loan.bunga) || 0;
  if (tenor <= 0) return [];
  const angsuranPokok = Math.round(principal / tenor);
  const angsuranBunga = Math.round(principal * (rate / 100));
  const out = [];
  let sisa = principal;
  const start = new Date(loan.tanggal + 'T00:00:00');
  for (let i = 1; i <= tenor; i++) {
    const pokok = i === tenor ? sisa : angsuranPokok;
    sisa -= pokok;
    const due = new Date(start.getFullYear(), start.getMonth() + i, start.getDate());
    out.push({
      angsuranKe: i,
      jatuhTempo: due.toISOString().slice(0, 10),
      pokok,
      bunga: angsuranBunga,
      total: pokok + angsuranBunga
    });
  }
  return out;
}
function computeMemberSavings(data, memberId) {
  let pokok = 0,
    wajib = 0,
    sukarela = 0;
  data.savingsTx.forEach(t => {
    if (t.memberId !== memberId) return;
    const sign = t.aksi === 'setor' ? 1 : -1;

  });
  return {

    wajib,
    sukarela,
    total: pokok + wajib + sukarela
  };
}

    bunga: acc.bunga + Number(p.bunga || 0)

}

function computeBranchStats(data, cabangId) {
